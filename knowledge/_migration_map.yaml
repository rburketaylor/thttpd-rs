# Migration Map
# Maps C source modules to Rust crate equivalents

migrations:
  - c_module: match.c
    rust_crate: thttpd-match
    status: verified
    notes: "Direct translation. Pattern syntax preserved. Differential tests pass."

  - c_module: mime_types.h
    rust_crate: thttpd-mime
    status: verified
    notes: "Static tables converted to match statements. Differential tests pass."

  - c_module: tdate_parse.c
    rust_crate: thttpd-tdate
    status: verified
    notes: "Date parsing with epoch calculation. Differential tests pass."

  - c_module: fdwatch.c
    rust_crate: thttpd-fdwatch
    status: verified
    notes: "Thin mio wrapper. Token constants for dispatch. Differential tests pass."

  - c_module: timers.c
    rust_crate: thttpd-timers
    status: verified
    notes: "BinaryHeap replaces hash-of-sorted-lists. Differential tests pass."

  - c_module: mmc.c
    rust_crate: thttpd-mmc
    status: verified
    notes: "Rc<Mmap> for reference counting. HashMap for cache. Differential tests pass."

  - c_module: libhttpd.c
    rust_crate: thttpd-http
    status: verified
    notes: "Split into parse, response, cgi, dirlist, conn modules. 71/71 differential tests pass (9 timeout-heavy tests deferred)."

  - c_module: thttpd.c
    rust_crate: thttpd-core
    status: verified
    notes: "Event loop, startup, signal handling, throttling. 71/71 differential tests pass."
