# Migration Map
# Maps C source modules to Rust crate equivalents

migrations:
  - c_module: match.c
    rust_crate: thttpd-match
    status: verified
    parity: "request scenarios verified"
    notes: "Direct translation. Shell-style glob matching preserved. 105 differential scenarios pass."

  - c_module: mime
    rust_crate: thttpd-mime
    status: verified
    parity: "request scenarios verified"
    notes: "Static tables converted to match statements. 105 differential scenarios pass."

  - c_module: tdate_parse.c
    rust_crate: thttpd-tdate
    status: verified
    parity: "request scenarios verified"
    notes: "HTTP date parsing with epoch calculation. 105 differential scenarios pass."

  - c_module: fdwatch.c
    rust_crate: thttpd-fdwatch
    status: verified
    parity: "request scenarios verified"
    notes: "Thin mio wrapper replacing select()/poll(). Token constants for dispatch. 105 differential scenarios pass."

  - c_module: timers.c
    rust_crate: thttpd-timers
    status: verified
    parity: "request scenarios verified"
    notes: "BinaryHeap replaces hash-of-sorted-lists. Lazy cancellation. 105 differential scenarios pass."

  - c_module: mmc.c
    rust_crate: thttpd-mmc
    status: verified
    parity: "request scenarios verified"
    notes: "Rc<Mmap> for reference counting. HashMap for cache. 105 differential scenarios pass."

  - c_module: libhttpd.c
    rust_crate: thttpd-http
    status: verified
    parity: "request scenarios verified"
    notes: "Split into parse, response, auth, cgi, dirlist, conn, method, url, error modules. 105 differential scenarios pass."

  - c_module: thttpd.c
    rust_crate: thttpd-core
    status: verified
    parity: "partial operational parity"
    notes: "Event loop, startup, signals, and config are implemented. Runtime throttle enforcement and other operational deviations are tracked separately."

  - c_module: thttpd_migrate
    rust_crate: thttpd-migrate
    status: implemented
    parity: "proxy integration verified"
    notes: "New strangler-fig migration proxy. Active-active/canary routing, shadow diffing, health checks, circuit breaker, metrics, state, control socket, rollback, and drain are covered by 31 proxy integration tests."

test_summary:
