name: thttpd-rs CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Rust workspace
        run: cargo build --manifest-path rust/Cargo.toml --workspace --release

  build-legacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build C thttpd
        run: bash pipeline/build_legacy.sh

  unit-tests:
    runs-on: ubuntu-latest
    needs: build-rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Rust unit tests
        run: cargo test --manifest-path rust/Cargo.toml --workspace

  harness-tests:
    runs-on: ubuntu-latest
    needs: [build-rust, build-legacy]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Python dependencies
        run: pip install pytest pytest-timeout pyyaml
      - name: Build both binaries
        run: |
          bash pipeline/build_legacy.sh
          cargo build --manifest-path rust/Cargo.toml --release
      - name: Run C-only harness tests (80 tests)
        run: |
          python3 -m pytest harness/tests/ --ignore=harness/tests/test_differential.py \
            -v --timeout=30 --timeout-method=thread
      - name: Run differential tests (80 tests, C vs Rust)
        run: |
          python3 -m pytest harness/tests/test_differential.py \
            -v --timeout=120 --timeout-method=thread

  knowledge-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate knowledge system
        run: python3 pipeline/validate_knowledge.py
